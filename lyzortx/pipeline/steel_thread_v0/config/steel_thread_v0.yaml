# Steel thread v0 defaults
st01:
  raw_interactions_path: data/interactions/raw/raw_interactions.csv
  output_dir: lyzortx/generated_outputs/steel_thread_v0/intermediate
  expected_observations_per_pair: 9
  min_interpretable_obs_for_hard_negative: 5
  high_uninterpretable_fraction_threshold: 0.25

st01b:
  st01_pair_audit_path: lyzortx/generated_outputs/steel_thread_v0/intermediate/st01_pair_label_audit.csv
  output_dir: lyzortx/generated_outputs/steel_thread_v0/intermediate
  min_positive_lysis_obs: 2
  min_positive_fraction: 0.4
  min_negative_no_lysis_obs: 7
  max_uninterpretable_obs: 1

st02:
  st01b_pair_audit_path: lyzortx/generated_outputs/steel_thread_v0/intermediate/st01b_pair_confidence_audit.csv
  host_metadata_path: data/genomics/bacteria/picard_collection.csv
  phage_metadata_path: data/genomics/phages/guelin_collection.csv
  interaction_matrix_path: data/interactions/interaction_matrix.csv
  cv_groups_path: data/metadata/370+host_cross_validation_groups_1e-4.csv
  output_dir: lyzortx/generated_outputs/steel_thread_v0/intermediate
  allow_missing_joins: false

st03:
  st02_pair_table_path: lyzortx/generated_outputs/steel_thread_v0/intermediate/st02_pair_table.csv
  output_dir: lyzortx/generated_outputs/steel_thread_v0/intermediate
  holdout_group_fraction: 0.2
  n_cv_folds: 5
  split_salt: steel_thread_v0_st03_split_v1

st04:
  st02_pair_table_path: lyzortx/generated_outputs/steel_thread_v0/intermediate/st02_pair_table.csv
  st03_split_assignments_path: lyzortx/generated_outputs/steel_thread_v0/intermediate/st03_split_assignments.csv
  output_dir: lyzortx/generated_outputs/steel_thread_v0/intermediate
  random_state: 42
  logreg_c: 1.0
  logreg_max_iter: 2000

st05:
  st04_predictions_path: lyzortx/generated_outputs/steel_thread_v0/intermediate/st04_pair_predictions_raw.csv
  st02_pair_table_path: lyzortx/generated_outputs/steel_thread_v0/intermediate/st02_pair_table.csv
  output_dir: lyzortx/generated_outputs/steel_thread_v0/intermediate
  calibration_fold: 0
  ece_bins: 10
  platt_random_state: 42

st06:
  st05_predictions_path: lyzortx/generated_outputs/steel_thread_v0/intermediate/st05_pair_predictions_calibrated.csv
  output_dir: lyzortx/generated_outputs/steel_thread_v0/intermediate
  top_k: 3
  score_column: pred_logreg_platt
  max_per_family: 0

st06b:
  st05_predictions_path: lyzortx/generated_outputs/steel_thread_v0/intermediate/st05_pair_predictions_calibrated.csv
  output_dir: lyzortx/generated_outputs/steel_thread_v0/intermediate
  top_k: 3
  max_per_family: 2

st07:
  st04_metrics_path: lyzortx/generated_outputs/steel_thread_v0/intermediate/st04_model_metrics_raw.json
  st05_calibration_summary_path: lyzortx/generated_outputs/steel_thread_v0/intermediate/st05_calibration_summary.csv
  st05_ranked_predictions_path: lyzortx/generated_outputs/steel_thread_v0/intermediate/st05_ranked_predictions.csv
  st06_top3_path: lyzortx/generated_outputs/steel_thread_v0/intermediate/st06_top3_recommendations.csv
  st06_summary_path: lyzortx/generated_outputs/steel_thread_v0/intermediate/st06_recommendation_summary.json
  output_dir: lyzortx/generated_outputs/steel_thread_v0
