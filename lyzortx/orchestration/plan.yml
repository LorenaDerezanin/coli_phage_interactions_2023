tracks:
  ST:
    name: Steel Thread v0
    description: Prove end-to-end viability with a minimal but honest pipeline using
      internal data only.
    stage: 0
    depends_on: []
    tasks:
    - id: ST01
      title: Define v0 label policy and uncertainty flags from raw interactions
      status: done
      implemented_in: lyzortx/pipeline/steel_thread_v0/steps/st01_label_policy.py
      baseline: lyzortx/pipeline/steel_thread_v0/baselines/st01_expected_metrics.json
    - id: ST01B
      title: Add strict confidence tiering as a parallel output from ST0.1 to support
        dual-slice evaluation
      status: done
      implemented_in: lyzortx/pipeline/steel_thread_v0/steps/st01b_confidence_tiers.py
      baseline: lyzortx/pipeline/steel_thread_v0/baselines/st01b_expected_metrics.json
    - id: ST02
      title: Build one canonical pair table with IDs, labels, uncertainty, and v0
        feature blocks
      status: done
      implemented_in: lyzortx/pipeline/steel_thread_v0/steps/st02_build_pair_table.py
      baseline: lyzortx/pipeline/steel_thread_v0/baselines/st02_expected_metrics.json
    - id: ST03
      title: Lock one leakage-safe split protocol and one fixed holdout benchmark
        for v0
      status: done
      implemented_in: lyzortx/pipeline/steel_thread_v0/steps/st03_build_splits.py
      baseline: lyzortx/pipeline/steel_thread_v0/baselines/st03_expected_metrics.json
    - id: ST04
      title: Train one strong tabular baseline and one simple comparator baseline
      status: done
      implemented_in: lyzortx/pipeline/steel_thread_v0/steps/st04_train_baselines.py
      baseline: lyzortx/pipeline/steel_thread_v0/baselines/st04_expected_metrics.json
    - id: ST05
      title: Calibrate probabilities and export ranked per-strain phage predictions
      status: done
      implemented_in: lyzortx/pipeline/steel_thread_v0/steps/st05_calibrate_rank.py
      baseline: lyzortx/pipeline/steel_thread_v0/baselines/st05_expected_metrics.json
    - id: ST06
      title: Generate top-3 recommendations with policy-tuned defaults
      status: done
      implemented_in: lyzortx/pipeline/steel_thread_v0/steps/st06_recommend_top3.py
      baseline: lyzortx/pipeline/steel_thread_v0/baselines/st06_expected_metrics.json
    - id: ST06B
      title: Compare ranking policy variants to avoid recommendation-policy regressions
      status: done
      implemented_in: lyzortx/pipeline/steel_thread_v0/steps/st06b_compare_ranking_policies.py
    - id: ST07
      title: Emit one reproducible report to generated_outputs/steel_thread_v0/
      status: done
      implemented_in: lyzortx/pipeline/steel_thread_v0/steps/st07_build_report.py
      baseline: lyzortx/pipeline/steel_thread_v0/baselines/st07_expected_metrics.json
    - id: ST08
      title: Add dual-slice reporting (full-label and strict-confidence) to ST0.7
      status: done
      acceptance_criteria:
      - ST0.7 report includes separate metric rows for full-label and strict-confidence
        slices
      - Both slices report top-3 hit rate, calibration ECE, and Brier score
    - id: ST09
      title: Document failure case hypotheses for each major holdout miss error bucket
      status: done
      acceptance_criteria:
      - Each holdout miss strain in error_analysis.csv has at least one documented
        hypothesis
      - Hypotheses are written to the track lab notebook with actionable next steps
  A:
    name: Data Integrity and Labeling
    description: Canonical IDs, label policies, cohort contracts, and replicate-aware
      label sets from raw data.
    stage: 0
    depends_on: []
    tasks:
    - id: TA01
      title: Build a canonical ID map for bacteria and phages across all tables
      status: done
      implemented_in: lyzortx/generated_outputs/track_a/id_map/{bacteria_id_map.csv,phage_id_map.csv}
    - id: TA02
      title: Resolve naming/alias mismatches (for example legacy phage names)
      status: done
      implemented_in: lyzortx/generated_outputs/track_a/id_map/{bacteria_alias_resolution.csv,phage_alias_resolution.csv}
    - id: TA03
      title: Add automated data integrity checks for row/column consistency
      status: done
      implemented_in: lyzortx/pipeline/track_a/checks/check_track_a_integrity.py
    - id: TA04
      title: Define and document handling policy for uninterpretable labels (score='n')
      status: done
      implemented_in: lyzortx/generated_outputs/track_a/labels/{label_set_v1_policy.json,label_set_v2_policy.json}
    - id: TA05
      title: Add plaque-image-assisted QC pass for ambiguous/conflicting pairs
      status: done
      implemented_in: lyzortx/generated_outputs/track_a/qc/{plaque_image_qc_queue.csv,plaque_image_qc_summary.json}
    - id: TA06
      title: Define cohort contracts and denominator rules for all reports
      status: done
      implemented_in: lyzortx/generated_outputs/track_a/cohort/{cohort_contracts.csv,cohort_contracts.json}
    - id: TA07
      title: Preserve replicate and dilution structure in intermediate tables
      status: done
      implemented_in: lyzortx/generated_outputs/track_a/labels/track_a_observations_with_ids.csv
    - id: TA08
      title: 'Create label set v1: any_lysis, lysis_strength, dilution_potency, uncertainty_flags'
      status: done
      implemented_in: lyzortx/generated_outputs/track_a/labels/label_set_v1_pairs.csv
    - id: TA09
      title: Create label set v2 with alternative aggregation assumptions and compare
        impact
      status: done
      implemented_in: lyzortx/generated_outputs/track_a/labels/{label_set_v2_pairs.csv,label_set_v1_v2_comparison.csv}
    - id: TA10
      title: Add scripts that regenerate all derived labels from raw data in one command
      status: done
      implemented_in: lyzortx/pipeline/track_a/run_track_a.py
  B:
    name: Exploratory Analysis and Signal Discovery
    description: Profile interactions, identify hard-to-lyse strains, rescuer phages,
      and dilution-response patterns.
    stage: 1
    depends_on:
    - A
    tasks:
    - id: TB01
      title: Profile raw interaction matrix composition and replicate consistency
      status: done
    - id: TB02
      title: Quantify morphotype breadth and narrow-susceptibility patterns
      status: done
    - id: TB03
      title: Characterize hard-to-lyse strains by known host traits
      status: done
      acceptance_criteria:
      - Identify strains with zero or very few lytic phages in the interaction matrix
      - Report which host metadata fields (serotype, phylogroup, ST) correlate with
        low susceptibility
      - Output a summary CSV and findings in the track lab notebook
    - id: TB04
      title: Characterize rescuer phages for narrow-susceptibility strains
      status: done
    - id: TB05
      title: Analyze dilution-response patterns per phage and per bacterial subgroup
      status: done
  C:
    name: Feature Engineering (Host)
    description: Defense-system subtypes, OMP receptor variants, capsule/LPS detail,
      and phylogenomic embeddings for host strains.
    stage: 1
    depends_on:
    - A
    tasks:
    - id: TC01
      title: Build defense-system subtype feature block from defense_finder annotations
      status: done
      acceptance_criteria:
      - Ingest 370+host_defense_systems_subtypes.csv (138 subtype columns, 404 strains)
      - Variance filter drops subtypes present in <5 or >395 strains
      - Derived features include defense diversity, CRISPR presence, Abi burden
      - Output CSV joinable on bacteria column with ~60-80 informative features
    - id: TC02
      title: Build OMP receptor variant feature block from BLAST cluster assignments
      status: done
      acceptance_criteria:
      - Ingest blast_results_cured_clusters=99_wide.tsv (12 receptor proteins, 404
        strains)
      - Encode cluster IDs as categoricals (one-hot top-k, group rare clusters)
      - Output CSV joinable on bacteria column with ~20 receptor features
    - id: TC03
      title: Build extended host surface features (capsule detail, LPS core, UMAP
        embeddings)
      status: done
      acceptance_criteria:
      - Add Klebsiella-type capsule, LPS core type, and 8D UMAP phylogenomic embeddings
      - All features joinable on bacteria column
      - Missingness indicators added for features with incomplete coverage
    - id: TC04
      title: Integrate host feature blocks into v1 pair table
      status: done
      acceptance_criteria:
      - All host feature blocks merged into a single host feature matrix
      - Join completeness verified (no unexpected NaN increase vs source data)
      - Quick LightGBM sanity check on training fold confirms lift over v0
  D:
    name: Feature Engineering (Phage)
    description: RBP features, genome k-mer embeddings, and phage distance embeddings
      from existing genomic data.
    stage: 1
    depends_on:
    - A
    tasks:
    - id: TD01
      title: Build RBP feature block from RBP_list.csv annotations
      status: done
      acceptance_criteria:
      - Parse per-phage RBP count, has_fiber, has_spike, RBP type composition
      - Handle NAs with indicator features for missing RBP annotations
      - Output CSV joinable on phage column with ~5-8 features
    - id: TD02
      title: Build genome k-mer embedding features from phage FNA files
      status: done
      acceptance_criteria:
      - Compute tetranucleotide (k=4) frequency vectors from 97 FNA genomes
      - Reduce via SVD to 20-30 dimensions
      - Add GC content and continuous genome length
      - Output CSV joinable on phage column with ~25-30 features
    - id: TD03
      title: Build phage distance embedding from VIRIDIC phylogenetic tree
      status: done
      acceptance_criteria:
      - Extract pairwise distances from 96_viridic_distance_phylogenetic_tree_algo=upgma.nwk
      - Compute MDS embedding to 5-8 dimensions
      - Output CSV joinable on phage column
  E:
    name: Pairwise Compatibility Features
    description: RBP-receptor compatibility, defense evasion proxy, and phylogenetic
      distance features that break the popular-phage bias.
    stage: 1
    depends_on:
    - C
    - D
    tasks:
    - id: TE01
      title: Build RBP-receptor compatibility features from curated genus-receptor
        lookup
      status: done
      acceptance_criteria:
      - Curated lookup mapping phage genus/subfamily to known primary receptor targets
      - Per-pair features include target_receptor_present, receptor_cluster_matches,
        receptor_variant_seen_in_training_positives
      - Output CSV joinable on bacteria+phage pair with ~5-8 features
    - id: TE02
      title: Build defense evasion proxy features from training-fold collaborative
        filtering
      status: done
      acceptance_criteria:
      - For each phage family, compute average lysis rate against each defense subtype
        from training data only
      - Per-pair expected evasion score computed as sum of phage family success rates
        against host defense systems
      - Leakage verified by computing on training fold only, never holdout
    - id: TE03
      title: Build phylogenetic distance to isolation host features
      status: done
      acceptance_criteria:
      - UMAP Euclidean distance between target host and phage isolation host
      - Defense Jaccard distance between target host and phage isolation host
      - Output CSV joinable on bacteria+phage pair with ~3-4 features
  F:
    name: Evaluation Protocol
    description: Lock v1 benchmark split and add bootstrap confidence intervals. ST03
      already provides leakage-safe host-group and phage-family holdouts. TF01/TF02
      are done but their metrics are invalidated by the label-leakage fix — they will
      be re-run as part of TG06.
    stage: 2
    depends_on:
    - G
    tasks:
    - id: TF01
      title: Lock ST03 split as v1 benchmark and add bootstrap CIs for all metrics
      status: done
      model: gpt-5.4-mini
      acceptance_criteria:
      - Existing ST03 split locked as the canonical v1 evaluation protocol
      - Bootstrap CIs (1000 resamples of holdout strains) for top-3 hit rate, AUC,
        Brier score, and ECE
      - Dual-slice reporting (full-label and strict-confidence) for all metrics
    - id: TF02
      title: Before/after comparison of v0 vs v1 with error bucket analysis
      status: done
      model: gpt-5.4-mini
      acceptance_criteria:
      - Side-by-side metrics table for v0 (metadata logreg) vs v1 (genomic GBM)
      - Error bucket analysis showing which v0 holdout misses v1 fixed and why
      - Honest reporting of strains that remain unpredictable
  G:
    name: Modeling Pipeline
    stage: 2
    depends_on:
    - C
    - D
    - E
    description: LightGBM model on expanded genomic features with calibration, ablation,
      and SHAP interpretation.
    tasks:
    - id: TG01
      title: Train LightGBM binary classifier on v1 expanded feature set
      status: done
      acceptance_criteria:
      - LightGBM with hyperparameter tuning via 5-fold CV on existing leakage-safe
        cv_groups
      - Logistic regression kept as interpretable comparator
      - Target AUC 0.87-0.90 and top-3 hit rate 90%+
    - id: TG02
      title: Calibrate GBM outputs with isotonic and Platt scaling
      status: done
      acceptance_criteria:
      - Same calibration approach as ST05 applied to GBM
      - Report ECE, Brier, log-loss for both calibration methods
      - Target ECE < 0.03 on full-label
    - id: TG03
      title: Run feature-block ablation suite proving which features deliver lift
      status: done
      acceptance_criteria:
      - 'Ablation arms: v0 features only, +defense subtypes, +OMP receptors, +phage
        genomic, +pairwise compatibility, all features'
      - Each arm reports AUC, top-3 hit rate, Brier on same holdout split
      - v0 baseline is reference point in all comparisons
    - id: TG04
      title: Compute SHAP explanations for per-pair and global feature importance
      status: done
      model: gpt-5.4
      acceptance_criteria:
      - TreeExplainer SHAP values for GBM model
      - Per-pair explanations answering why each phage was recommended for each strain
      - Global feature importance ranking across the panel
      - Per-strain summary of what makes each strain hard or easy to predict
      - Concrete recommendation of which feature blocks to keep in final v1 model,
        based on SHAP evidence and TG03 ablation results
    - id: TG05
      title: Run feature-subset sweep to find best block combination for top-3 ranking
      status: done
      model: gpt-5.4
      acceptance_criteria:
      - Train models on all 2-block and 3-block combinations of the 4 new feature
        blocks (defense, OMP, phage-genomic, pairwise)
      - Reuse the TG01 winning hyperparameters for all sweep arms — do NOT run per-arm
        hyperparameter search. The goal is to isolate the feature-block effect, not
        confound it with per-arm tuning differences.
      - Report top-3 hit rate, AUC, and Brier on the same ST03 holdout for each combo
      - Identify the winning subset that maximizes top-3 hit rate without degrading
        AUC
      - Compare winning subset against the TG01 all-features model
      - Include a deployment-realistic arm that excludes all features derived from
        training labels (legacy_label_breadth_count, legacy_receptor_support_count)
        to measure generalization to truly novel strains
      - Report both panel-evaluation and deployment-realistic metrics for the winning
        configuration
      - Lock the final v1 feature configuration for downstream Track F and H
    - id: TG06
      title: Delete label-leaked features from the feature pipeline
      status: done
      model: gpt-5.4-mini
      acceptance_criteria:
      - 'Remove legacy_label_breadth_count: delete the (n_infections, legacy_label_breadth_count)
        rename in st02_build_pair_table.py and drop the column from ST02 output'
      - 'Remove legacy_receptor_support_count: delete its construction in build_rbp_receptor_compatibility_feature_block.py
        (Track E) and drop it from the TE01 output schema'
      - Remove the LABEL_DERIVED_COLUMNS list in run_feature_subset_sweep.py and the
        deployment-realistic arm logic that depends on it
      - Delete v1_config_keys.py and simplify v1_feature_configuration.json to a single
        flat feature config (no panel_default vs deployment_realistic_sensitivity
        split)
      - Grep the entire lyzortx/ tree for legacy_label_breadth_count and legacy_receptor_support_count
        — zero hits must remain
      - All existing tests pass after deletions
    - id: TG07
      title: Retrain, recalibrate, and re-run SHAP and ablation on the clean feature
        set
      status: done
      model: gpt-5.4-mini
      acceptance_criteria:
      - Retrain LightGBM on the clean feature set (reuse TG01 hyperparameters)
      - Recalibrate (isotonic + Platt) and report AUC, top-3, Brier, ECE
      - Re-run SHAP explanations on the clean model
      - Re-run feature-block ablation on the clean feature set
      - Update v1_feature_configuration.json with the clean model metrics
    - id: TG08
      title: Re-run downstream tracks and verify end-to-end pipeline
      status: done
      model: gpt-5.4-mini
      acceptance_criteria:
      - Re-run explained recommendations (Track H) against clean model outputs
      - Re-run v0-vs-v1 evaluation (Track F) against clean model metrics
      - Run python -m lyzortx.pipeline.track_j.run_track_j end-to-end and verify it
        completes without error on the clean pipeline
      - The old label-leaked metrics must not appear in any output
    - id: TG09
      title: Fix LightGBM determinism and lock defense + phage_genomic as v1 winner
      status: done
      model: gpt-5.4-mini
      acceptance_criteria:
      - Add deterministic=True to make_lightgbm_estimator in train_v1_binary_classifier.py
      - Remove n_jobs=1 from make_lightgbm_estimator (deterministic=True handles thread
        safety, force_col_wise=True is already set)
      - Update v1_feature_configuration.json to lock defense + phage_genomic as the
        winner (exclude pairwise block — 5 of 13 features are training-label-derived)
      - Remove the feature-subset-sweep step from Track J's run_track_j.py so the
        lock file is treated as a human decision, not a regenerated output
      - Verify two consecutive runs of run_track_g.py --step train-v1-binary produce
        identical outputs
    - id: TG10
      title: Re-run downstream tracks on the stable 2-block lock
      status: done
      model: gpt-5.4-mini
      acceptance_criteria:
      - Re-run Track H explained recommendations against the 2-block model outputs
      - Re-run Track F v0-vs-v1 evaluation against the 2-block model metrics
      - Run python -m lyzortx.pipeline.track_j.run_track_j end-to-end and verify it
        completes without error
      - Verify v1_feature_configuration.json is unchanged after the Track J run (sweep
        no longer regenerates it)
    - id: TG11
      title: Investigate non-leaky features that close the calibration gap
      status: done
      model: gpt-5.4
      acceptance_criteria:
      - 'Pairwise soft leakage context: TE02 defense_evasion_* features (4) and TE01
        receptor_variant_seen_in_training_positives (1) are training-label-derived
        via collaborative filtering. Do not include these in candidate features.'
      - 'Clean pairwise candidates to evaluate individually: TE03 isolation_host distances
        (2 features) and TE01 curated lookup features (lookup_available, target_receptor_present,
        protein_target_present, surface_target_present, receptor_cluster_matches)'
      - Propose and test at least two candidate features (from clean pairwise or other
        sources) that do not leak training labels
      - Report whether any candidate recovers >50% of the AUC gap between the 2-block
        model (~0.837) and the old leaked model (~0.911) without degrading top-3
      - If no candidate closes the gap, accept the 2-block calibration as the honest
        v1 baseline
    - id: TG12
      title: Delete soft-leaky training-label-derived features from Track E code
      status: done
      model: gpt-5.4-mini
      acceptance_criteria:
      - Delete the legacy soft-leaky pairwise block from Track E code
      - Remove the exact-variant training-positive flag from the RBP-receptor compatibility
        block
      - Update downstream tests that assert on removed columns
      - Grep lyzortx/ for the removed pairwise feature names — zero hits outside lab
        notebooks
      - All existing tests pass after deletions
  H:
    name: In-Silico Cocktail Recommendation
    description: Top-k recommendations with SHAP-based explanations. TH01/TH02 are
      done but will be re-run as part of TG06 against the clean model.
    stage: 2
    depends_on:
    - G
    tasks:
    - id: TH01
      title: Benchmark policy variants for top-k recommendation and lock a non-regressing
        default
      status: done
    - id: TH02
      title: Add explained recommendations with calibrated P(lysis), CI, and SHAP
        features
      status: done
      model: gpt-5.4-mini
      acceptance_criteria:
      - Each top-3 recommendation includes calibrated P(lysis), 95% CI, and top-3
        SHAP features
      - Output format suitable for clinician or CDMO operator review
      - Report covers all holdout strains
  I:
    name: External Data and Literature Integration
    description: Tier A supervised and Tier B weak-label ingestion with source-fidelity,
      ablations, and lift tracking. Track K consumes Track I outputs for per-source
      lift measurement.
    stage: 1
    depends_on:
    - A
    tasks:
    - id: TI01
      title: Create a curated reading list of closely related phage-host prediction
        papers
      status: done
      implemented_in: lyzortx/research_notes/LITERATURE.md
    - id: TI02
      title: Build source_registry.csv for all external sources
      status: done
      implemented_in: lyzortx/research_notes/external_data/source_registry.csv
    - id: TI03
      title: Download and ingest VHRdb pairs with source-fidelity fields
      status: done
      model: gpt-5.4
      acceptance_criteria:
      - Download VHRdb data from https://phage.ee.cityu.edu.hk/ into lyzortx/generated_outputs/track_i/tier_a_ingest/
      - Output CSV contains >0 real bacteria-phage pairs
      - Each row preserves raw global_response and datasource_response without case
        folding
      - source_datasource_id, source_disagreement_flag, and source_native_record_id
        populated
      - Raise FileNotFoundError or request error on download failure, never silently
        skip
    - id: TI04
      title: 'Download and ingest Tier A sources: BASEL, KlebPhaCol, GPB'
      status: done
      model: gpt-5.4
      acceptance_criteria:
      - Download BASEL from publication supplement, KlebPhaCol from https://klebphacol.com/,
        GPB from https://phagebank.org/
      - Each source produces an ingested CSV with >0 rows under lyzortx/generated_outputs/track_i/tier_a_ingest/
      - All rows carry source_system provenance
      - Raise on download failure, do not silently produce empty output
    - id: TI05
      title: Harmonize Tier A datasets to internal schema
      status: done
      model: gpt-5.4
      acceptance_criteria:
      - Map external bacteria and phage names to canonical IDs via Track A alias resolution
      - Report how many external pairs overlap with the internal 404x96 panel vs are
        novel
      - Output a harmonized pair table with >0 rows joinable on pair_id
      - Raise ValueError if harmonization produces zero joinable rows
    - id: TI06
      title: 'Download and ingest Tier B: Virus-Host DB and NCBI BioSample metadata'
      status: done
      model: gpt-5.4
      acceptance_criteria:
      - Download Virus-Host DB associations from https://www.genome.jp/virushostdb/
      - Download NCBI Virus/BioSample metadata via Entrez API
      - Each source produces an ingested CSV with >0 rows
      - BioSample host_disease and isolation_host fields parsed from XML attributes
      - Raise on empty API responses or download failures
    - id: TI07
      title: Assign confidence tiers to all ingested external labels
      status: done
      model: gpt-5.4
      acceptance_criteria:
      - Apply the 4-bin confidence policy (high/medium/low/exclude) to TI03-TI06 output
        rows
      - Output CSV contains >0 rows with confidence_tier and training_weight columns
      - Report tier distribution (count per tier per source) in lab notebook
      - Raise ValueError if any source produces zero tiered rows
    - id: TI08
      title: Build training cohorts from internal + external rows
      status: pending
      model: gpt-5.4-mini
      acceptance_criteria:
      - Produce ti08_training_cohort_rows.csv with internal rows plus TI07 external
        rows
      - Output must contain >0 external rows — fail if all external data was excluded
      - External rows carry source_system, confidence_tier, and training_weight
      - Internal-only baseline arm must remain extractable from the same file
    - id: TI09
      title: 'Run strict ablations: internal -> +VHRdb -> +BASEL -> +KlebPhaCol ->
        +GPB -> +Tier B'
      status: pending
      model: gpt-5.4-mini
      acceptance_criteria:
      - Retrain the locked v1 model for each cumulative source addition
      - Each arm must train on >0 external rows from the added source
      - Report AUC, top-3, Brier for each arm on the ST03 holdout
      - Raise ValueError if any arm trains on zero external rows
    - id: TI10
      title: Track incremental lift and failure modes by datasource and confidence
        tier
      status: pending
      model: gpt-5.4-mini
      acceptance_criteria:
      - Produce a summary table showing per-source lift deltas from TI09
      - Identify failure modes with real row counts >0
      - Report which sources helped, hurt, or were neutral based on actual metrics
  K:
    name: External Data Lift Measurement
    description: Incrementally add Track I external sources to the v1 model and measure
      per-source lift. Each task adds exactly one source, retrains, and reports metrics
      against the internal-only baseline. This isolates the contribution of each external
      dataset.
    stage: 2
    depends_on:
    - I
    - G
    tasks:
    - id: TK01
      title: Add VHRdb to training and measure lift vs internal-only baseline
      status: pending
      model: gpt-5.4-mini
      acceptance_criteria:
      - TI08 cohort must contain >0 VHRdb rows — fail if missing or empty
      - Retrain with internal + VHRdb on the locked ST03 holdout split
      - Augmented training set must contain >0 VHRdb rows after join
      - Report AUC, top-3, Brier delta vs the locked 2-block internal-only baseline
      - If lift is negative or negligible, document why and do not include VHRdb in
        subsequent arms
    - id: TK02
      title: Add BASEL to training and measure cumulative lift
      status: pending
      model: gpt-5.4-mini
      acceptance_criteria:
      - TI08 cohort must contain >0 BASEL rows — fail if missing or empty
      - Add BASEL rows to the best-so-far cohort
      - Augmented training set must contain >0 BASEL rows after join
      - Retrain and report AUC, top-3, Brier delta vs previous best
      - Document whether BASEL adds, hurts, or is neutral
    - id: TK03
      title: Add KlebPhaCol to training and measure cumulative lift
      status: pending
      model: gpt-5.4-mini
      acceptance_criteria:
      - TI08 cohort must contain >0 KlebPhaCol rows — fail if missing or empty
      - Add KlebPhaCol rows to the best-so-far cohort
