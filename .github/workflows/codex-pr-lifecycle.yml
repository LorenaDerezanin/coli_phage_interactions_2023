name: Codex PR Lifecycle

# Triggered exclusively by workflow_dispatch — either from the Claude PR
# Review workflow (after it posts a COMMENTED review) or manually.
# This eliminates the self-trigger loop where Codex thread replies fired
# pull_request_review events that cancelled the in-progress Codex run via
# the concurrency group.
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to address feedback on"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

# Only one lifecycle run per PR at a time. New runs cancel in-progress ones
# to prevent race conditions on the review round cap label.
concurrency:
  group: codex-lifecycle-pr-${{ inputs.pr_number }}
  cancel-in-progress: true

jobs:
  resolve-ci-image:
    name: Resolve CI image
    runs-on: ubuntu-24.04
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
      ci_image_profile: ${{ steps.profile.outputs.profile }}
      ci_image_label: ${{ steps.profile.outputs.label }}
      ci_image: ${{ steps.profile.outputs.image }}
    steps:
      - name: Generate Czarphage token
        id: czarphage
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CZARPHAGE_APP_ID }}
          private-key: ${{ secrets.CZARPHAGE_PRIVATE_KEY }}

      - name: Resolve PR number
        id: pr
        run: |
          echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"

      - name: Resolve CI image profile from PR or linked issue labels
        # PR label is required; do not silently fall back to another source.
        id: profile
        env:
          GITHUB_TOKEN: ${{ steps.czarphage.outputs.token }}
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          LABELS=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name | select(startswith("ci-image:"))]')
          COUNT=$(echo "$LABELS" | jq 'length')
          if [ "$COUNT" -ne 1 ]; then
            echo "::error::PR #${PR_NUM} must have exactly one ci-image:* label; found ${COUNT}."
            echo "$LABELS"
            exit 1
          fi
          LABEL=$(echo "$LABELS" | jq -r '.[0]')
          PROFILE="${LABEL#ci-image:}"
          case "$PROFILE" in
            base|host-typing|full-bio) ;;
            *)
              echo "::error::Unsupported CI image profile '${PROFILE}' on PR #${PR_NUM}."
              exit 1
              ;;
          esac
          IMAGE="ghcr.io/lyzortx/coli-phage-interactions-2023-codex-ci:${PROFILE}-main"
          echo "label=${LABEL}" >> "$GITHUB_OUTPUT"
          echo "profile=${PROFILE}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

  # ── Address feedback from Claude review on orchestrator PRs ──────────
  # The 3-round cap (codex-review-round-N labels) prevents infinite loops.
  address-feedback:
    name: Address Review Feedback
    needs: resolve-ci-image
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    container:
      image: ${{ needs.resolve-ci-image.outputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ github.token }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Generate Czarphage token
        id: czarphage
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CZARPHAGE_APP_ID }}
          private-key: ${{ secrets.CZARPHAGE_PRIVATE_KEY }}

      - name: Resolve PR number and branch
        id: pr
        env:
          GITHUB_TOKEN: ${{ steps.czarphage.outputs.token }}
        run: |
          PR_NUM="${{ inputs.pr_number }}"
          echo "number=${PR_NUM}" >> "$GITHUB_OUTPUT"
          BRANCH=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json headRefName --jq '.headRefName')
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0
          token: ${{ steps.czarphage.outputs.token }}

      - name: Create CI scratch directory
        run: mkdir -p .scratch/ci

      - name: Refresh prebaked envs from repo manifests
        shell: bash
        run: |
          if ! command -v micromamba >/dev/null 2>&1; then
            echo "::error::micromamba not found in workflow container."
            exit 1
          fi

          PROFILE="${{ needs.resolve-ci-image.outputs.ci_image_profile }}"
          micromamba env update -f environment.yml -n phage_env --prune
          if [ "$PROFILE" = "host-typing" ] || [ "$PROFILE" = "full-bio" ]; then
            micromamba env update -f environment.phylogroup-caller.yml -n phylogroup_caller --prune
            micromamba env update -f environment.serotype-caller.yml -n serotype_caller --prune
            micromamba env update -f environment.sequence-type-caller.yml -n sequence_type_caller --prune
          fi
          if [ "$PROFILE" = "full-bio" ]; then
            micromamba env update -f environment.phage-annotation-tools.yml -n phage_annotation_tools --prune
          fi
          micromamba run -n phage_env python --version
          micromamba run -n phage_env pip --version

      - name: Check for unresolved review threads
        id: comments
        env:
          GITHUB_TOKEN: ${{ steps.czarphage.outputs.token }}
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          UNRESOLVED_COUNT=$(micromamba run -n phage_env python -m lyzortx.orchestration.review_threads "$OWNER" "$REPO" "$PR_NUM" /dev/null --count-only)
          echo "has_feedback=$([[ $UNRESOLVED_COUNT -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "Unresolved threads: ${UNRESOLVED_COUNT}"

      - name: No feedback — label as clean
        if: steps.comments.outputs.has_feedback == 'false'
        env:
          GITHUB_TOKEN: ${{ steps.czarphage.outputs.token }}
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          gh pr edit "$PR_NUM" --repo "${{ github.repository }}" --add-label "ready-for-human-review"
          gh pr comment "$PR_NUM" --repo "${{ github.repository }}" \
            --body "Review passed with no issues. Ready for human review and merge."

      - name: Check review round cap
        if: steps.comments.outputs.has_feedback == 'true'
        id: round
        env:
          GITHUB_TOKEN: ${{ steps.czarphage.outputs.token }}
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          ROUND=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name | select(startswith("codex-review-round-"))] | length')
          echo "round=${ROUND:-0}" >> "$GITHUB_OUTPUT"

          if [ "${ROUND:-0}" -ge 3 ]; then
            gh pr comment "$PR_NUM" --repo "${{ github.repository }}" \
              --body "Maximum automated fix rounds (3) reached. Requesting human review."
            gh pr edit "$PR_NUM" --repo "${{ github.repository }}" --add-label "needs-human-review"
          fi

      - name: Collect unresolved review feedback
        if: steps.comments.outputs.has_feedback == 'true' && fromJSON(steps.round.outputs.round) < 3
        env:
          GITHUB_TOKEN: ${{ steps.czarphage.outputs.token }}
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          PROFILE="${{ needs.resolve-ci-image.outputs.ci_image_profile }}"
          IMAGE_LABEL="${{ needs.resolve-ci-image.outputs.ci_image_label }}"
          RAW_FEEDBACK=.scratch/ci/codex_feedback_raw.txt
          micromamba run -n phage_env python -m lyzortx.orchestration.review_threads "$OWNER" "$REPO" "$PR_NUM" "$RAW_FEEDBACK"
          {
            echo "In this GitHub Actions environment, use 'micromamba run -n phage_env ...' for Python, pytest, and pre-commit commands."
            echo "This PR is assigned CI image profile '${PROFILE}' via GitHub label '${IMAGE_LABEL}'."
            if [ "$PROFILE" = "host-typing" ] || [ "$PROFILE" = "full-bio" ]; then
              echo "Dedicated caller envs are also available via 'micromamba run -n phylogroup_caller ...',"
              echo "'micromamba run -n serotype_caller ...', and 'micromamba run -n sequence_type_caller ...'."
            fi
            if [ "$PROFILE" = "full-bio" ]; then
              echo "Heavy bioinformatics CLIs live in 'micromamba run -n phage_annotation_tools ...'."
            fi
            echo ""
            cat "$RAW_FEEDBACK"
          } > .scratch/ci/codex_feedback.txt

      - name: Configure git identity for Codex agent
        if: steps.comments.outputs.has_feedback == 'true' && fromJSON(steps.round.outputs.round) < 3
        run: |
          git config user.name "czarphage[bot]"
          git config user.email "3227910+czarphage[bot]@users.noreply.github.com"

      - name: Install pre-commit hooks
        if: steps.comments.outputs.has_feedback == 'true' && fromJSON(steps.round.outputs.round) < 3
        run: |
          micromamba run -n phage_env pre-commit install
          micromamba run -n phage_env pre-commit install --hook-type pre-push

      - name: Extract model from linked issue
        if: steps.comments.outputs.has_feedback == 'true' && fromJSON(steps.round.outputs.round) < 3
        id: model
        env:
          GITHUB_TOKEN: ${{ steps.czarphage.outputs.token }}
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          BODY=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json body --jq '.body')
          ISSUE_NUM=$(echo "$BODY" | grep -oP '(?<=Closes #)\d+' | head -1)
          if [ -z "$ISSUE_NUM" ]; then
            echo "::error::No linked issue found in PR #${PR_NUM} body."
            exit 1
          fi
          gh issue view "$ISSUE_NUM" --repo "${{ github.repository }}" --json body --jq '.body' > .scratch/ci/issue_body.txt
          MODEL=$(micromamba run -n phage_env python -c "from pathlib import Path; from lyzortx.orchestration.parse_model_directive import extract_model; print(extract_model(Path('.scratch/ci/issue_body.txt').read_text()) or '')")
          if [ -z "$MODEL" ]; then
            echo "::error::No model directive in issue #${ISSUE_NUM}."
            exit 1
          fi
          echo "model=${MODEL}" >> "$GITHUB_OUTPUT"
          echo "Using model: ${MODEL} (from issue #${ISSUE_NUM})"

      - name: Fix with Codex
        if: steps.comments.outputs.has_feedback == 'true' && fromJSON(steps.round.outputs.round) < 3
        env:
          GITHUB_TOKEN: ${{ steps.czarphage.outputs.token }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ steps.model.outputs.model }}
          allow-bots: true
          sandbox: danger-full-access
          prompt-file: .scratch/ci/codex_feedback.txt

      # Thread resolution is handled by Claude during re-review, not here.
      # Codex pushes fixes → Claude re-reviews → resolves threads it's satisfied with.

      - name: Bump review round
        if: steps.comments.outputs.has_feedback == 'true' && fromJSON(steps.round.outputs.round) < 3
        env:
          GITHUB_TOKEN: ${{ steps.czarphage.outputs.token }}
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          NEXT_ROUND=$(( ${{ steps.round.outputs.round }} + 1 ))
          gh pr edit "$PR_NUM" --repo "${{ github.repository }}" --add-label "codex-review-round-${NEXT_ROUND}"
