name: Codex PR Lifecycle

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to address feedback on"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

# Only one lifecycle run per PR at a time. New runs cancel in-progress ones
# to prevent race conditions on the review round cap label.
concurrency:
  group: codex-lifecycle-pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  # ── Auto-merge on Claude approval ───────────────────────────────────
  # Scoped to github-actions[bot] (Claude) only. Human approvals should
  # be merged manually — auto-merge on bot approval is safe because the
  # bot follows deterministic review rules.
  auto-merge-on-approve:
    name: Auto-merge on Approval
    if: >-
      github.event.review.state == 'approved'
      && github.event.review.user.login == 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      GITHUB_TOKEN: ${{ secrets.ORCHESTRATOR_PAT }}
    steps:
      - name: Resolve PR number
        id: pr
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          echo "number=${PR_NUM}" >> "$GITHUB_OUTPUT"

      - name: Label and auto-merge
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          gh pr edit "$PR_NUM" --repo "${{ github.repository }}" --add-label "ready-for-human-review"
          gh pr merge "$PR_NUM" --repo "${{ github.repository }}" --squash --auto \
            --body "Auto-merged after Claude approval and passing CI."
          echo "Auto-merge enabled for PR #${PR_NUM}. Will merge when required checks pass."

  # ── Address feedback from any commented review ───────────────────────
  # Only triggers on COMMENTED reviews from known reviewer bots:
  #   - chatgpt-codex-connector[bot]: Codex review bot
  #   - github-actions[bot]: Claude (via claude-code-action with GITHUB_TOKEN)
  # This prevents a feedback loop: Codex replies via ORCHESTRATOR_PAT post as
  # the PAT holder, which would re-trigger this workflow endlessly if we
  # accepted all COMMENTED reviews. workflow_dispatch is always allowed.
  address-feedback:
    name: Address Review Feedback
    if: >-
      github.event_name == 'workflow_dispatch'
      || (
        github.event.review.state == 'commented'
        && (
          github.event.review.user.login == 'chatgpt-codex-connector[bot]'
          || github.event.review.user.login == 'github-actions[bot]'
        )
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    # PAT required: github.token can't trigger other workflows (GitHub anti-recursion).
    env:
      GITHUB_TOKEN: ${{ secrets.ORCHESTRATOR_PAT }}

    steps:
      - name: Resolve PR number and branch
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUM="${{ inputs.pr_number }}"
          else
            PR_NUM="${{ github.event.pull_request.number }}"
          fi
          echo "number=${PR_NUM}" >> "$GITHUB_OUTPUT"
          BRANCH=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json headRefName --jq '.headRefName')
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.ORCHESTRATOR_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for unresolved review threads
        id: comments
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          UNRESOLVED_COUNT=$(python -m lyzortx.orchestration.review_threads "$OWNER" "$REPO" "$PR_NUM" /dev/null --count-only)
          echo "has_feedback=$([[ $UNRESOLVED_COUNT -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "Unresolved threads: ${UNRESOLVED_COUNT}"

      - name: No feedback — label as clean
        if: >-
          github.event_name != 'workflow_dispatch'
          && steps.comments.outputs.has_feedback == 'false'
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          gh pr edit "$PR_NUM" --repo "${{ github.repository }}" --add-label "ready-for-human-review"
          gh pr comment "$PR_NUM" --repo "${{ github.repository }}" \
            --body "Review passed with no issues. Ready for human review and merge."

      - name: Check review round cap
        if: steps.comments.outputs.has_feedback == 'true'
        id: round
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          ROUND=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name | select(startswith("codex-review-round-"))] | length')
          echo "round=${ROUND:-0}" >> "$GITHUB_OUTPUT"

          if [ "${ROUND:-0}" -ge 3 ]; then
            gh pr comment "$PR_NUM" --repo "${{ github.repository }}" \
              --body "Maximum automated fix rounds (3) reached. Requesting human review."
            gh pr edit "$PR_NUM" --repo "${{ github.repository }}" --add-label "needs-human-review"
          fi

      - name: Collect unresolved review feedback
        if: steps.comments.outputs.has_feedback == 'true' && fromJSON(steps.round.outputs.round) < 3
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          python -m lyzortx.orchestration.review_threads "$OWNER" "$REPO" "$PR_NUM" /tmp/codex_feedback.txt

      - name: Configure git identity for Codex agent
        if: steps.comments.outputs.has_feedback == 'true' && fromJSON(steps.round.outputs.round) < 3
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install pre-commit hooks
        if: steps.comments.outputs.has_feedback == 'true' && fromJSON(steps.round.outputs.round) < 3
        run: pre-commit install

      # Workaround for https://github.com/openai/codex/issues/12572
      # Remove once codex-action fixes bwrap sandbox on Ubuntu 24.04
      - name: Fix sandbox compatibility with Ubuntu 24.04 AppArmor
        if: steps.comments.outputs.has_feedback == 'true' && fromJSON(steps.round.outputs.round) < 3
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Fix with Codex
        if: steps.comments.outputs.has_feedback == 'true' && fromJSON(steps.round.outputs.round) < 3
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.4
          allow-bots: true
          sandbox: danger-full-access
          prompt-file: /tmp/codex_feedback.txt

      # Thread resolution is handled by Claude during re-review, not here.
      # Codex pushes fixes → Claude re-reviews → resolves threads it's satisfied with.

      - name: Bump review round
        if: steps.comments.outputs.has_feedback == 'true' && fromJSON(steps.round.outputs.round) < 3
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          NEXT_ROUND=$(( ${{ steps.round.outputs.round }} + 1 ))
          gh pr edit "$PR_NUM" --repo "${{ github.repository }}" --add-label "codex-review-round-${NEXT_ROUND}"
