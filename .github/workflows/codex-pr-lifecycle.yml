name: Codex PR Lifecycle

on:
  pull_request_target:
    types: [opened, synchronize]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    name: Codex Review
    if: >-
      github.event_name == 'pull_request_target'
      && contains(join(github.event.pull_request.labels.*.name, ','), 'orchestrator-task')
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check review round
        id: round
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ROUND=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name | select(startswith("codex-review-round-"))] | length')
          echo "round=${ROUND:-0}" >> "$GITHUB_OUTPUT"

      - name: Cap reached -- request human review
        if: fromJSON(steps.round.outputs.round) >= 3
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "Maximum automated review rounds (3) reached. Requesting human review."
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --add-label "needs-human-review"

      - name: Checkout for Codex review
        if: fromJSON(steps.round.outputs.round) < 3
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Review with Codex
        if: fromJSON(steps.round.outputs.round) < 3
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.4
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in this repository.

            Check: code quality, test coverage, alignment with acceptance criteria in the linked issue,
            and adherence to AGENTS.md policies.

            If the PR looks good, approve it:
              gh pr review ${{ github.event.pull_request.number }} --approve --body "LGTM"

            If changes are needed, request changes with specific actionable comments:
              gh pr review ${{ github.event.pull_request.number }} --request-changes --body "..."

      - name: Add review round label
        if: fromJSON(steps.round.outputs.round) < 3
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEXT_ROUND=$(( ${{ steps.round.outputs.round }} + 1 ))
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --add-label "codex-review-round-${NEXT_ROUND}"

  handle-review-result:
    name: Handle Review Result
    if: >-
      github.event_name == 'pull_request_review'
      && contains(join(github.event.pull_request.labels.*.name, ','), 'orchestrator-task')
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Approved -- label for human review
        if: github.event.review.state == 'approved'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --add-label "ready-for-human-review"
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "Codex review passed. Ready for human review and merge."

      - name: Changes requested -- fix with Codex
        if: github.event.review.state == 'changes_requested'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ROUND=$(gh pr view "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name | select(startswith("codex-review-round-"))] | length')

          if [ "$ROUND" -ge 3 ]; then
            gh pr comment "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" \
              --body "Maximum review rounds reached after ${ROUND} iterations. Human review required."
            gh pr edit "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" \
              --add-label "needs-human-review"
            exit 0
          fi

      - name: Checkout for Codex fix
        if: github.event.review.state == 'changes_requested'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Fix with Codex
        if: github.event.review.state == 'changes_requested'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.4
          prompt: |
            PR #${{ github.event.pull_request.number }} received review feedback requesting changes.

            Read the review comments on this PR and address every issue raised.
            Run tests: pytest -q lyzortx/tests/
            Push a new commit with the fixes.
