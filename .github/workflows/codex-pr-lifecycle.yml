name: Codex PR Lifecycle

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to address feedback on"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  address-feedback:
    name: Address Review Feedback
    if: >-
      github.event_name == 'workflow_dispatch'
      || (
        github.event.review.state == 'commented'
        && github.event.review.user.login == 'chatgpt-codex-connector[bot]'
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    # PAT required: github.token can't trigger other workflows (GitHub anti-recursion).
    env:
      GITHUB_TOKEN: ${{ secrets.ORCHESTRATOR_PAT }}

    steps:
      - name: Resolve PR number and branch
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUM="${{ inputs.pr_number }}"
          else
            PR_NUM="${{ github.event.pull_request.number }}"
          fi
          echo "number=${PR_NUM}" >> "$GITHUB_OUTPUT"
          BRANCH=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json headRefName --jq '.headRefName')
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Check for review feedback
        id: comments
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          REVIEW_ID="${{ github.event.review.id }}"

          # Check inline comments (--slurp combines paginated pages before counting)
          if [ -n "$REVIEW_ID" ]; then
            INLINE_COUNT=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUM}/comments" --paginate \
              --jq "[.[] | select(.user.login == \"chatgpt-codex-connector[bot]\" and .pull_request_review_id == ${REVIEW_ID})]" \
              | jq -s 'add | length')
          else
            INLINE_COUNT=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUM}/comments" --paginate \
              --jq '[.[] | select(.user.login == "chatgpt-codex-connector[bot]")]' \
              | jq -s 'add | length')
          fi

          # Check review body for substantive feedback (not just boilerplate)
          REVIEW_BODY_HAS_FEEDBACK=0
          if [ -n "$REVIEW_ID" ]; then
            BODY=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUM}/reviews/${REVIEW_ID}" --jq '.body')
            # Codex "no issues" reviews contain "Didn't find any major issues" or are empty
            if [ -n "$BODY" ] && ! echo "$BODY" | grep -qi "didn't find any major issues"; then
              REVIEW_BODY_HAS_FEEDBACK=1
            fi
          fi

          TOTAL=$((INLINE_COUNT + REVIEW_BODY_HAS_FEEDBACK))
          echo "inline_count=${INLINE_COUNT}" >> "$GITHUB_OUTPUT"
          echo "review_body_has_feedback=${REVIEW_BODY_HAS_FEEDBACK}" >> "$GITHUB_OUTPUT"
          echo "has_feedback=$([[ $TOTAL -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "Inline: ${INLINE_COUNT}, Review body feedback: ${REVIEW_BODY_HAS_FEEDBACK}"

      - name: No feedback — label as clean
        if: steps.comments.outputs.has_feedback == 'false'
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          gh pr edit "$PR_NUM" --repo "${{ github.repository }}" --add-label "ready-for-human-review"
          gh pr comment "$PR_NUM" --repo "${{ github.repository }}" \
            --body "Codex review passed with no issues. Ready for human review and merge."

      - name: Check review round cap
        if: steps.comments.outputs.has_feedback == 'true'
        id: round
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          ROUND=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name | select(startswith("codex-review-round-"))] | length')
          echo "round=${ROUND:-0}" >> "$GITHUB_OUTPUT"

          if [ "${ROUND:-0}" -ge 3 ]; then
            gh pr comment "$PR_NUM" --repo "${{ github.repository }}" \
              --body "Maximum automated fix rounds (3) reached. Requesting human review."
            gh pr edit "$PR_NUM" --repo "${{ github.repository }}" --add-label "needs-human-review"
          fi

      - name: Collect review feedback
        if: steps.comments.outputs.has_feedback == 'true' && fromJSON(steps.round.outputs.round) < 3
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          REVIEW_ID="${{ github.event.review.id }}"

          {
            echo "# Review feedback to address for PR #${PR_NUM}"
            echo ""
            echo "## Inline review comments (on specific lines)"
            echo ""
            if [ -n "$REVIEW_ID" ]; then
              gh api "repos/${{ github.repository }}/pulls/${PR_NUM}/comments" --paginate \
                --jq ".[] | select(.user.login == \"chatgpt-codex-connector[bot]\" and .pull_request_review_id == ${REVIEW_ID}) | \"### \" + .path + \":\" + (.line // .original_line | tostring) + \"\n\n\" + .body + \"\n\""
            else
              gh api "repos/${{ github.repository }}/pulls/${PR_NUM}/comments" --paginate \
                --jq '.[] | select(.user.login == "chatgpt-codex-connector[bot]") | "### " + .path + ":" + (.line // .original_line | tostring) + "\n\n" + .body + "\n"'
            fi
            echo ""
            echo "## General PR comments"
            echo ""
            gh api "repos/${{ github.repository }}/issues/${PR_NUM}/comments" --paginate \
              --jq '.[] | select(.user.login == "chatgpt-codex-connector[bot]") | .body + "\n"'
            echo ""
            echo "# Instructions"
            echo ""
            echo "Address every issue raised above. Follow AGENTS.md policies."
            echo "You MUST reply to every review comment using gh api to post a reply."
            echo "For each comment: either fix the issue and explain what you changed, or push back explaining why the feedback is wrong or unnecessary."
            echo "Run tests: pytest -q lyzortx/tests/"
            echo "Commit and push fixes to the current branch."
          } > /tmp/codex_feedback.txt

      - name: Checkout PR branch
        if: steps.comments.outputs.has_feedback == 'true' && fromJSON(steps.round.outputs.round) < 3
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - name: Set up Python
        if: steps.comments.outputs.has_feedback == 'true' && fromJSON(steps.round.outputs.round) < 3
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.12"

      - name: Install dependencies
        if: steps.comments.outputs.has_feedback == 'true' && fromJSON(steps.round.outputs.round) < 3
        run: pip install -r requirements.txt

      # Workaround for https://github.com/openai/codex/issues/12572
      # Remove once codex-action fixes bwrap sandbox on Ubuntu 24.04
      - name: Fix sandbox compatibility with Ubuntu 24.04 AppArmor
        if: steps.comments.outputs.has_feedback == 'true' && fromJSON(steps.round.outputs.round) < 3
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Fix with Codex
        if: steps.comments.outputs.has_feedback == 'true' && fromJSON(steps.round.outputs.round) < 3
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.4
          codex-args: --full-auto -c 'sandbox_workspace_write.network_access=true'
          prompt-file: /tmp/codex_feedback.txt

      - name: Verify all comments were answered
        if: steps.comments.outputs.has_feedback == 'true' && fromJSON(steps.round.outputs.round) < 3
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          REVIEW_ID="${{ github.event.review.id }}"
          ARGS=""
          if [ -n "$REVIEW_ID" ]; then
            ARGS="--review-id ${REVIEW_ID}"
          fi
          gh api "repos/${{ github.repository }}/pulls/${PR_NUM}/comments" --paginate \
            | python -m lyzortx.orchestration.verify_review_replies $ARGS

      - name: Request re-review
        if: steps.comments.outputs.has_feedback == 'true' && fromJSON(steps.round.outputs.round) < 3
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          NEXT_ROUND=$(( ${{ steps.round.outputs.round }} + 1 ))
          gh pr edit "$PR_NUM" --repo "${{ github.repository }}" --add-label "codex-review-round-${NEXT_ROUND}"
          gh pr comment "$PR_NUM" --repo "${{ github.repository }}" --body "@codex review"
