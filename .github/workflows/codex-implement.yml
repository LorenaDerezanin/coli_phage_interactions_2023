name: Codex Implement Task

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to implement"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  implement:
    name: Implement Task
    if: >-
      github.event_name == 'workflow_dispatch'
      || contains(join(github.event.issue.labels.*.name, ','), 'orchestrator-task')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    # PAT required: github.token can't trigger other workflows (GitHub anti-recursion).
    env:
      GITHUB_TOKEN: ${{ secrets.ORCHESTRATOR_PAT }}

    steps:
      - name: Resolve issue number
        id: issue
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ORCHESTRATOR_PAT }}
          fetch-depth: 0

      - name: Build prompt
        run: |
          ISSUE_NUM="${{ steps.issue.outputs.number }}"
          {
            echo "# Task"
            echo ""
            gh issue view "$ISSUE_NUM" --json title,body --jq '"## " + .title + "\n\n" + .body'
            echo ""
            echo "# Instructions"
            echo ""
            echo "Implement the task described above. This is issue #${ISSUE_NUM}."
            echo "Follow the policies in AGENTS.md and lyzortx/AGENTS.md."
            echo ""
            echo "Steps:"
            echo "1. Implement the task as described."
            echo "2. Run tests: pytest -q lyzortx/tests/"
            echo "3. Commit your changes with detailed, descriptive commit messages."
            echo "4. Push your branch and create a PR with gh pr create."
            echo "   The PR title must follow the pattern: [ORCH][TASK_ID] Brief description"
            echo "   The PR body must include a detailed description of changes AND 'Closes #${ISSUE_NUM}' at the end."
            echo "   Add --label orchestrator-task to the gh pr create command."
          } > /tmp/codex_prompt.txt

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Workaround for https://github.com/openai/codex/issues/12572
      # Remove once codex-action fixes bwrap sandbox on Ubuntu 24.04
      - name: Fix sandbox compatibility with Ubuntu 24.04 AppArmor
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Implement task with Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.4
          sandbox: danger-full-access
          codex-args: --ask-for-approval never
          prompt-file: /tmp/codex_prompt.txt

      - name: Verify Codex created a PR
        run: |
          ISSUE_NUM="${{ steps.issue.outputs.number }}"
          # Verify a PR exists whose head branch has commits beyond main (remote state)
          PR_JSON=$(gh pr list --search "Closes #${ISSUE_NUM}" --json number,headRefName --jq '.[0]')
          if [ -z "$PR_JSON" ] || [ "$PR_JSON" = "null" ]; then
            echo "::error::Codex did not create a PR for issue #${ISSUE_NUM}."
            exit 1
          fi
          PR_NUM=$(echo "$PR_JSON" | jq -r '.number')
          BRANCH=$(echo "$PR_JSON" | jq -r '.headRefName')
          # Verify the branch actually exists on the remote
          if ! git ls-remote --exit-code origin "refs/heads/${BRANCH}" > /dev/null 2>&1; then
            echo "::error::PR #${PR_NUM} references branch '${BRANCH}' but it was not pushed."
            exit 1
          fi
          echo "PR #${PR_NUM} created on branch '${BRANCH}' for issue #${ISSUE_NUM}."
