name: Codex Implement Task

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to implement"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  implement:
    name: Implement Task
    if: >-
      github.event_name == 'workflow_dispatch'
      || contains(join(github.event.issue.labels.*.name, ','), 'orchestrator-task')
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Resolve issue number
        id: issue
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build prompt
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM="${{ steps.issue.outputs.number }}"
          {
            echo "# Task"
            echo ""
            gh issue view "$ISSUE_NUM" --json title,body --jq '"## " + .title + "\n\n" + .body'
            echo ""
            echo "# Instructions"
            echo ""
            echo "Implement the task described above. This is issue #${ISSUE_NUM}."
            echo ""
            echo "Follow the policies in AGENTS.md and lyzortx/AGENTS.md."
            echo ""
            echo "Steps:"
            echo "1. Implement the task as described."
            echo "2. Run tests: pytest -q lyzortx/tests/"
            echo "3. Append findings to lyzortx/research_notes/LAB NOTEBOOK.md following the existing entry format."
            echo "4. Create a PR:"
            echo "   gh pr create \\"
            echo "     --title \"[ORCH][TASK_ID] Brief description\" \\"
            echo "     --body \"Closes #${ISSUE_NUM}\" \\"
            echo "     --label orchestrator-task"
          } > /tmp/codex_prompt.txt

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Implement task with Codex
        uses: openai/codex-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.4
          codex-args: --full-auto
          prompt-file: /tmp/codex_prompt.txt
