name: Claude Implement Task

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to implement"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: read
  id-token: write

jobs:
  resolve-ci-image:
    name: Resolve CI image
    if: >-
      github.event_name == 'workflow_dispatch'
      || contains(join(github.event.issue.labels.*.name, ','), 'orchestrator-task')
    runs-on: ubuntu-24.04
    outputs:
      issue_number: ${{ steps.issue.outputs.number }}
      ci_image_profile: ${{ steps.profile.outputs.profile }}
      ci_image_label: ${{ steps.profile.outputs.label }}
      ci_image: ${{ steps.profile.outputs.image }}
    steps:
      - name: Generate Czarphage token
        id: czarphage
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CZARPHAGE_APP_ID }}
          private-key: ${{ secrets.CZARPHAGE_PRIVATE_KEY }}

      - name: Resolve issue number
        id: issue
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve CI image profile from issue labels
        id: profile
        env:
          GITHUB_TOKEN: ${{ steps.czarphage.outputs.token }}
        run: |
          ISSUE_NUM="${{ steps.issue.outputs.number }}"
          LABELS=$(gh issue view "$ISSUE_NUM" --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name | select(startswith("ci-image:"))]')
          COUNT=$(echo "$LABELS" | jq 'length')
          if [ "$COUNT" -ne 1 ]; then
            echo "::error::Issue #${ISSUE_NUM} must have exactly one ci-image:* label; found ${COUNT}."
            echo "$LABELS"
            exit 1
          fi
          LABEL=$(echo "$LABELS" | jq -r '.[0]')
          PROFILE="${LABEL#ci-image:}"
          # Keep this allowlist in sync with
          # lyzortx/orchestration/ci_image_profiles.py::VALID_CI_IMAGE_PROFILES.
          case "$PROFILE" in
            base|host-typing|full-bio) ;;
            *)
              echo "::error::Unsupported CI image profile '${PROFILE}' on issue #${ISSUE_NUM}."
              exit 1
              ;;
          esac
          # Under normal triggers (issues.opened) github.ref_name is always
          # "main", so the branch-tag path only fires during manual
          # workflow_dispatch runs against a feature branch — used for testing
          # in-flight image changes before they land on main.
          if [ "${{ github.ref_name }}" = "main" ]; then
            IMAGE_TAG="${PROFILE}-main"
          else
            SAFE_REF=$(printf '%s' "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' | tr '/_' '--')
            IMAGE_TAG="${PROFILE}-branch-${SAFE_REF}"
          fi
          IMAGE="ghcr.io/lyzortx/coli-phage-interactions-2023-codex-ci:${IMAGE_TAG}"
          echo "label=${LABEL}" >> "$GITHUB_OUTPUT"
          echo "profile=${PROFILE}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

  implement:
    name: Implement Task
    needs: resolve-ci-image
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      PIP_CACHE_DIR: ${{ github.workspace }}/.scratch/ci/pip-cache
    container:
      image: ${{ needs.resolve-ci-image.outputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ github.token }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Generate Czarphage token
        id: czarphage
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CZARPHAGE_APP_ID }}
          private-key: ${{ secrets.CZARPHAGE_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.czarphage.outputs.token }}
          fetch-depth: 0

      - name: Mark workspace as safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Create CI scratch directory
        run: mkdir -p .scratch/ci "$PIP_CACHE_DIR"

      - name: Refresh prebaked envs from repo manifests
        shell: bash
        run: |
          if ! command -v micromamba >/dev/null 2>&1; then
            echo "::error::micromamba not found in workflow container."
            exit 1
          fi

          PROFILE="${{ needs.resolve-ci-image.outputs.ci_image_profile }}"
          micromamba env update -f environment.yml -n phage_env --prune
          if [ "$PROFILE" = "host-typing" ] || [ "$PROFILE" = "full-bio" ]; then
            micromamba env update -f environment.phylogroup-caller.yml -n phylogroup_caller --prune
            micromamba env update -f environment.serotype-caller.yml -n serotype_caller --prune
            micromamba env update -f environment.sequence-type-caller.yml -n sequence_type_caller --prune
          fi
          if [ "$PROFILE" = "full-bio" ]; then
            micromamba env update -f environment.phage-annotation-tools.yml -n phage_annotation_tools --prune
          fi
          micromamba run -n phage_env python --version
          micromamba run -n phage_env pip --version

      - name: Extract and resolve model from issue
        id: model
        env:
          GITHUB_TOKEN: ${{ steps.czarphage.outputs.token }}
        run: |
          ISSUE_NUM="${{ needs.resolve-ci-image.outputs.issue_number }}"
          MODEL=$(gh issue view "$ISSUE_NUM" --repo "${{ github.repository }}" --json body --jq '.body' \
            | micromamba run -n phage_env python -m lyzortx.orchestration.parse_model_directive --provider claude)
          if [ -z "$MODEL" ]; then
            echo "::error::No model directive found in issue #${ISSUE_NUM} body. Add <!-- model: smart --> or <!-- model: simple --> to the issue."
            exit 1
          fi
          echo "model=${MODEL}" >> "$GITHUB_OUTPUT"
          echo "Using model: ${MODEL}"

      - name: Install pre-commit hooks
        run: |
          micromamba run -n phage_env pre-commit install
          micromamba run -n phage_env pre-commit install --hook-type pre-push

      - name: Configure git identity
        run: |
          git config user.name "czarphage[bot]"
          git config user.email "3227910+czarphage[bot]@users.noreply.github.com"

      - name: Implement task with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.czarphage.outputs.token }}
          allowed_bots: "czarphage,czarphage[bot]"
          track_progress: true
          prompt: |
            Implement the task described in issue #${{ needs.resolve-ci-image.outputs.issue_number }}.

            Read the issue with: gh issue view ${{ needs.resolve-ci-image.outputs.issue_number }} --json title,body
            Follow the policies in AGENTS.md and lyzortx/AGENTS.md.
            This task is assigned CI image profile '${{ needs.resolve-ci-image.outputs.ci_image_profile }}' via GitHub label '${{ needs.resolve-ci-image.outputs.ci_image_label }}'.
            GitHub Actions run ID: ${{ github.run_id }}. Current run attempt: ${{ github.run_attempt }}.
            ${{ github.run_attempt > 1 && 'This is a rerun. Pick up from prior run state instead of restarting from scratch. Use the gh-actions-logs skill to check earlier attempts.' || '' }}
            In this GitHub Actions environment, use 'micromamba run -n phage_env ...' for Python, pytest, and pre-commit commands.
            ${{ needs.resolve-ci-image.outputs.ci_image_profile == 'host-typing' || needs.resolve-ci-image.outputs.ci_image_profile == 'full-bio' && 'Dedicated caller envs are also available via micromamba run -n phylogroup_caller, serotype_caller, sequence_type_caller.' || '' }}
            ${{ needs.resolve-ci-image.outputs.ci_image_profile == 'full-bio' && 'Heavy bioinformatics CLIs live in micromamba run -n phage_annotation_tools.' || '' }}

            Steps:
            1. Create your working branch and open a draft PR as the very first step, before writing any code.
               The PR title must follow the pattern: [ORCH][TASK_ID] Brief description
               The PR body must include a description of the planned changes AND 'Closes #${{ needs.resolve-ci-image.outputs.issue_number }}'.
               Add --label orchestrator-task --label ${{ needs.resolve-ci-image.outputs.ci_image_label }} to the PR.
            2. Implement the task. Commit early and often with detailed, descriptive messages.
               Push after every meaningful commit so work is preserved if the run fails, times out, or exceeds quota.
            3. Run tests: micromamba run -n phage_env pytest -q lyzortx/tests/
            4. When implementation is complete and tests pass, mark the PR as ready for review.
               Update the PR title and body to accurately describe the final state of the changes.

            When posting any GitHub comment (issue comments, PR comments, review replies),
            end every comment with a signature line: 'Posted by Claude <model>'
            where <model> is the model you are running as.
            This is required for transparency about which agent produced the comment.
          claude_args: >-
            --model ${{ steps.model.outputs.model }}
            --allowedTools
            "Read,Write,Edit,Glob,Grep,Bash(git:*),Bash(gh:*),Bash(micromamba:*),Bash(pre-commit:*),Bash(ruff:*),Bash(ls:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(find:*),Bash(mkdir:*),Bash(cp:*),Bash(mv:*)"

      - name: Verify Claude created a PR
        id: pr
        env:
          GITHUB_TOKEN: ${{ steps.czarphage.outputs.token }}
        run: |
          ISSUE_NUM="${{ needs.resolve-ci-image.outputs.issue_number }}"
          # Use Python instead of gh pr list --search to avoid GitHub search index lag.
          PR_JSON=$(micromamba run -n phage_env python -m lyzortx.orchestration.find_pr_for_issue "$ISSUE_NUM")
          if [ $? -ne 0 ] || [ -z "$PR_JSON" ]; then
            echo "::error::Claude did not create a PR for issue #${ISSUE_NUM}."
            exit 1
          fi
          PR_NUM=$(echo "$PR_JSON" | jq -r '.number')
          BRANCH=$(echo "$PR_JSON" | jq -r '.headRefName')
          # Verify the branch actually exists on the remote
          if ! git ls-remote --exit-code origin "refs/heads/${BRANCH}" > /dev/null 2>&1; then
            echo "::error::PR #${PR_NUM} references branch '${BRANCH}' but it was not pushed."
            exit 1
          fi
          echo "number=${PR_NUM}" >> "$GITHUB_OUTPUT"
          echo "PR #${PR_NUM} created on branch '${BRANCH}' for issue #${ISSUE_NUM}."

      - name: Mirror CI image profile label onto PR
        env:
          GITHUB_TOKEN: ${{ steps.czarphage.outputs.token }}
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          gh issue edit "$PR_NUM" --repo "${{ github.repository }}" \
            --add-label "${{ needs.resolve-ci-image.outputs.ci_image_label }}"
