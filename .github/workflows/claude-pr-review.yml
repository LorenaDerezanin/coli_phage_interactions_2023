name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: write

concurrency:
  group: claude-review-pr-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  # ── Auto-review on orchestrator-task PRs ─────────────────────────────
  # Opus for the first review (opened), Sonnet for re-reviews (synchronize).
  # Only triggers for PRs with the 'orchestrator-task' label.
  auto-review:
    name: Claude Auto Review
    if: >-
      github.event_name == 'pull_request'
      && contains(join(github.event.pull_request.labels.*.name, ','), 'orchestrator-task')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check for existing Claude approval
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APPROVED=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
            --jq '[.[] | select(.user.login == "claude[bot]" and .state == "APPROVED")] | length')
          echo "skip=$([[ $APPROVED -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Select model
        if: steps.check.outputs.skip != 'true'
        id: model
        run: |
          if [ "${{ github.event.action }}" = "opened" ]; then
            echo "name=claude-opus-4-6" >> "$GITHUB_OUTPUT"
          else
            echo "name=claude-sonnet-4-6" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.check.outputs.skip != 'true'
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        if: steps.check.outputs.skip != 'true'
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: true
          track_progress: true
          claude_args: >-
            --model ${{ steps.model.outputs.name }}
            --allowedTools
            "mcp__github__create_pending_pull_request_review,mcp__github__add_comment_to_pending_review,mcp__github__submit_pending_pull_request_review,mcp__github__delete_pending_pull_request_review,mcp__github__get_pull_request_diff,Bash(gh pr view:*),Bash(gh api:*),Bash(python:*),Read,Glob,Grep"
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            1. Read AGENTS.md and lyzortx/AGENTS.md for review guidelines and project policies.
            2. Get the diff with mcp__github__get_pull_request_diff.
            3. Read relevant source files for context.
            4. Manage review threads (you are the sole judge of thread resolution):
               - List all threads with resolution state:
                 python -m lyzortx.orchestration.review_threads ${{ github.repository_owner }} ${{ github.event.repository.name }} ${{ github.event.pull_request.number }} /dev/null --json
               - Resolve adequately addressed threads:
                 gh api graphql -f query='mutation($id:ID!){resolveReviewThread(input:{threadId:$id}){thread{id isResolved}}}' -f id="THREAD_ID"
               - Unresolve inadequately resolved threads:
                 gh api graphql -f query='mutation($id:ID!){unresolveReviewThread(input:{threadId:$id}){thread{id isResolved}}}' -f id="THREAD_ID"
            5. Submit a formal review:
               - mcp__github__create_pending_pull_request_review to start.
               - mcp__github__add_comment_to_pending_review for inline comments.
               - mcp__github__submit_pending_pull_request_review to submit:
                 "APPROVE" if no substantive issues remain. "COMMENT" if there are suggestions.
                 NEVER use "REQUEST_CHANGES".

      # After Claude reviews, check the outcome and trigger downstream actions.
      # Auto-merge on approval; dispatch Codex lifecycle on commented reviews.
      - name: Check review outcome and dispatch
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.ORCHESTRATOR_PAT }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          LATEST_REVIEW=$(gh api --paginate "repos/${{ github.repository }}/pulls/${PR_NUM}/reviews" \
            --jq '[.[] | select(.user.login == "claude[bot]")] | last | .state')

          if [ "$LATEST_REVIEW" = "APPROVED" ]; then
            echo "Claude approved — enabling auto-merge."
            MERGE_OK=false
            for attempt in 1 2 3; do
              if gh pr merge "$PR_NUM" --repo "${{ github.repository }}" --squash --auto \
                   --body "Auto-merged after Claude approval and passing CI." 2>&1; then
                MERGE_OK=true
                break
              fi
              echo "Auto-merge attempt ${attempt} failed, retrying in 10s..."
              sleep 10
            done
            if [ "$MERGE_OK" != "true" ]; then
              echo "::error::Auto-merge failed after 3 attempts"
              exit 1
            fi
          elif [ "$LATEST_REVIEW" = "COMMENTED" ]; then
            echo "Claude left comments — dispatching Codex lifecycle."
            gh workflow run codex-pr-lifecycle.yml \
              --repo "${{ github.repository }}" \
              --field pr_number="$PR_NUM"
          else
            echo "Unexpected review state: ${LATEST_REVIEW}. No action taken."
          fi

  # ── Interactive @claude mentions in PR / issue comments ──────────────
  interactive:
    name: Claude Interactive
    if: >-
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment')
      && contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          track_progress: true
