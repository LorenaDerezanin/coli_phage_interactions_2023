name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: write

concurrency:
  group: claude-review-pr-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  # ── Auto-review on orchestrator-task PRs ─────────────────────────────
  # Opus for the first review (opened), Sonnet for re-reviews (synchronize).
  # Only triggers for PRs with the 'orchestrator-task' label.
  auto-review:
    name: Claude Auto Review
    if: >-
      github.event_name == 'pull_request'
      && contains(join(github.event.pull_request.labels.*.name, ','), 'orchestrator-task')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check for existing Claude review on current head
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CURRENT_REVIEW_STATE=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
            --jq '[.[] | select(.user.login == "claude[bot]" and .commit_id == "'"${CURRENT_HEAD_SHA}"'")] | last | .state // ""')
          echo "skip=$([[ -n "$CURRENT_REVIEW_STATE" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Select model
        if: steps.check.outputs.skip != 'true'
        id: model
        run: |
          if [ "${{ github.event.action }}" = "opened" ]; then
            echo "name=claude-opus-4-6" >> "$GITHUB_OUTPUT"
          else
            echo "name=claude-sonnet-4-6" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.check.outputs.skip != 'true'
        with:
          fetch-depth: 1

      - name: Set up Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip dependencies
        if: steps.check.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - uses: anthropics/claude-code-action@v1
        if: steps.check.outputs.skip != 'true'
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "czarphage,czarphage[bot]"
          use_sticky_comment: true
          track_progress: true
          claude_args: >-
            --model ${{ steps.model.outputs.name }}
            --allowedTools
            "mcp__github__create_pending_pull_request_review,mcp__github__add_comment_to_pending_review,mcp__github__submit_pending_pull_request_review,mcp__github__delete_pending_pull_request_review,mcp__github__get_pull_request_diff,Bash(gh pr view:*),Bash(gh api:*),Bash(python:*),Read,Glob,Grep"
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            1. Read AGENTS.md and lyzortx/AGENTS.md for review guidelines and project policies.
            2. Get the diff with mcp__github__get_pull_request_diff.
            3. Read relevant source files for context.
            4. In this GitHub Actions environment, run Python helper commands directly via `python ...`.
            5. Manage review threads (you are the sole judge of thread resolution):
               - List all threads with resolution state:
                 python -m lyzortx.orchestration.review_threads ${{ github.repository_owner }} ${{ github.event.repository.name }} ${{ github.event.pull_request.number }} /dev/null --json
               - Resolve adequately addressed threads:
                 gh api graphql -f query='mutation($id:ID!){resolveReviewThread(input:{threadId:$id}){thread{id isResolved}}}' -f id="THREAD_ID"
               - Unresolve inadequately resolved threads:
                 gh api graphql -f query='mutation($id:ID!){unresolveReviewThread(input:{threadId:$id}){thread{id isResolved}}}' -f id="THREAD_ID"
            6. Submit a formal review. Try the MCP tools first; if they error or are
               unavailable, fall back to the gh api REST approach.

               MCP approach (preferred):
                - mcp__github__create_pending_pull_request_review to start.
                - mcp__github__add_comment_to_pending_review for inline comments.
                - mcp__github__submit_pending_pull_request_review to submit.

               gh api fallback (if MCP tools fail):
                gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
                  -f event=EVENT -f body="REVIEW_BODY" -f commit_id="${{ github.event.pull_request.head.sha }}"

               Review decision:
                 "APPROVE" only if you would merge the current head as-is right now:
                 no substantive issues, no merge-blocking nits or follow-up fixes requested from Codex,
                 and no unresolved review threads.
                 If you identify anything that should delay merge, use "COMMENT" instead of "APPROVE".
                 NEVER use "REQUEST_CHANGES".

               CRITICAL: After submitting, verify the review was posted by running:
                 gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
                   --jq '[.[] | select(.user.login == "claude[bot]")] | last | .state // empty'
                 If this returns empty or null, your review was NOT posted. Retry with the gh api fallback.

      # After Claude reviews, check the outcome and trigger downstream actions.
      # Auto-merge on approval; dispatch Codex lifecycle on commented reviews.
      - name: Generate Czarphage token
        if: steps.check.outputs.skip != 'true'
        id: czarphage
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CZARPHAGE_APP_ID }}
          private-key: ${{ secrets.CZARPHAGE_PRIVATE_KEY }}

      - name: Check review outcome and dispatch
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.czarphage.outputs.token }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          CURRENT_HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          LATEST_REVIEW=$(gh api --paginate "repos/${{ github.repository }}/pulls/${PR_NUM}/reviews" \
            --jq '[.[] | select(.user.login == "claude[bot]" and .commit_id == "'"${CURRENT_HEAD_SHA}"'")] | last | .state // ""')
          UNRESOLVED_REVIEW_THREADS=$(python -m lyzortx.orchestration.review_threads \
            "${{ github.repository_owner }}" \
            "${{ github.event.repository.name }}" \
            "$PR_NUM" \
            /dev/null \
            --count-only)
          UNRESOLVED_REVIEW_THREADS=${UNRESOLVED_REVIEW_THREADS:-}
          if [ -z "$LATEST_REVIEW" ]; then
            echo "::warning::Claude completed but did not submit a formal review for head ${CURRENT_HEAD_SHA}. Treating as COMMENTED to dispatch lifecycle."
            LATEST_REVIEW="COMMENTED"
          fi
          if ! [[ "$UNRESOLVED_REVIEW_THREADS" =~ ^[0-9]+$ ]]; then
            echo "::error::Failed to fetch unresolved review thread count: '${UNRESOLVED_REVIEW_THREADS}'"
            exit 1
          fi
          if [ "$LATEST_REVIEW" = "APPROVED" ] && [ "$UNRESOLVED_REVIEW_THREADS" -gt 0 ]; then
            echo "::error::Claude approved head ${CURRENT_HEAD_SHA} with ${UNRESOLVED_REVIEW_THREADS} unresolved review thread(s)."
            exit 1
          fi

          if [ "$LATEST_REVIEW" = "APPROVED" ] && [ "$UNRESOLVED_REVIEW_THREADS" -eq 0 ]; then
            echo "Claude approved with zero unresolved review threads — enabling auto-merge."
            PR_BODY=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json body --jq '.body')
            MERGE_BODY=$(printf '%s\n\nAuto-merged after Claude approval and passing CI.' "$PR_BODY")
            MERGE_OK=false
            for attempt in 1 2 3; do
              if gh pr merge "$PR_NUM" --repo "${{ github.repository }}" --squash --auto \
                   --body "$MERGE_BODY" 2>&1; then
                MERGE_OK=true
                break
              fi
              echo "Auto-merge attempt ${attempt} failed, retrying in 10s..."
              sleep 10
            done
            if [ "$MERGE_OK" != "true" ]; then
              echo "::error::Auto-merge failed after 3 attempts"
              exit 1
            fi
          elif [ "$LATEST_REVIEW" = "COMMENTED" ] || [ "$UNRESOLVED_REVIEW_THREADS" -gt 0 ]; then
            echo "Review feedback remains (${UNRESOLVED_REVIEW_THREADS} unresolved thread(s)) — dispatching Codex lifecycle."
            gh workflow run codex-pr-lifecycle.yml \
              --repo "${{ github.repository }}" \
              --field pr_number="$PR_NUM"
          else
            echo "Unexpected review state: ${LATEST_REVIEW}. No action taken."
          fi

  # ── Interactive @claude mentions in PR / issue comments ──────────────
  interactive:
    name: Claude Interactive
    if: >-
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment')
      && contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip dependencies
        run: pip install -r requirements.txt

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          track_progress: true
