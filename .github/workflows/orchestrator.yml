name: PLAN Orchestrator

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Orchestrator command"
        required: true
        default: "run_once"
        type: choice
        options:
          - run_once
          - status
          - pause
          - resume
      note:
        description: "Optional event note"
        required: false
        type: string
      max_active_tasks:
        description: "Maximum concurrent in-progress tasks"
        required: false
        default: "50"
        type: string
  repository_dispatch:
    types:
      - orchestrator_cmd
  issues:
    types:
      - closed

permissions:
  contents: write
  issues: write

concurrency:
  group: orchestrator
  cancel-in-progress: false

jobs:
  orchestrator-tick:
    name: Orchestrator Tick
    if: ${{ github.event_name != 'issues' || contains(join(github.event.issue.labels.*.name, ','), 'orchestrator-task') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # App token required: github.token can't trigger other workflows (GitHub anti-recursion).
    # Both gh CLI and Python orchestrator read GITHUB_TOKEN.
    env:
      GITHUB_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Generate Czarphage token
        id: czarphage
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CZARPHAGE_APP_ID }}
          private-key: ${{ secrets.CZARPHAGE_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.czarphage.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.12"

      - name: Install dependencies
        run: pip install pyyaml==6.0.3 pymarkdownlnt==0.9.36

      - name: Resolve command payload
        id: payload
        run: |
          python - <<'PY'
          import json
          import os

          event_name = os.environ["GITHUB_EVENT_NAME"]
          event_path = os.environ["GITHUB_EVENT_PATH"]
          with open(event_path, "r", encoding="utf-8") as handle:
              event = json.load(handle)

          command = "run_once"
          note = ""
          max_active_tasks = "50"

          if event_name == "workflow_dispatch":
              inputs = event.get("inputs", {})
              command = inputs.get("command") or command
              note = inputs.get("note", "")
              max_active_tasks = inputs.get("max_active_tasks") or max_active_tasks
          elif event_name == "repository_dispatch":
              payload = event.get("client_payload", {})
              command = payload.get("command") or command
              note = payload.get("note", "")
              max_active_tasks = str(payload.get("max_active_tasks", max_active_tasks))
          elif event_name == "issues":
              issue_number = event.get("issue", {}).get("number")
              command = "run_once"
              note = f"Triggered by close of orchestrator issue #{issue_number}" if issue_number else "Triggered by issue close"

          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as out:
              out.write(f"command={command}\n")
              out.write(f"note={note}\n")
              out.write(f"max_active_tasks={max_active_tasks}\n")
          PY

      - name: Run orchestrator command
        env:
          GITHUB_TOKEN: ${{ steps.czarphage.outputs.token }}
        run: |
          set -euo pipefail

          args=(
            --command "${{ steps.payload.outputs.command }}"
            --plan-path lyzortx/orchestration/plan.yml
            --state-path lyzortx/generated_outputs/orchestration/runtime_state.json
            --max-active-tasks "${{ steps.payload.outputs.max_active_tasks }}"
          )

          if [[ -n "${{ steps.payload.outputs.note }}" ]]; then
            args+=(--note "${{ steps.payload.outputs.note }}")
          fi

          python -m lyzortx.orchestration.orchestrator "${args[@]}"

      - name: Emit current status
        env:
          GITHUB_TOKEN: ${{ steps.czarphage.outputs.token }}
        run: |
          python -m lyzortx.orchestration.orchestrator \
            --command status \
            --plan-path lyzortx/orchestration/plan.yml \
            --state-path lyzortx/generated_outputs/orchestration/runtime_state.json

      # Deliberately fails if push is rejected (e.g. by branch protection).
      # Plan updates must land on main for the orchestrator to stay in sync.
      - name: Commit plan updates
        run: |
          git config user.name "czarphage[bot]"
          git config user.email "3227910+czarphage[bot]@users.noreply.github.com"
          git add lyzortx/orchestration/plan.yml lyzortx/research_notes/PLAN.md
          if ! git diff --cached --quiet; then
            git commit -m "Update plan: mark completed task"
            git push
          fi

      - name: Upload orchestration state artifact
        uses: actions/upload-artifact@v6
        with:
          name: orchestrator-state
          path: lyzortx/generated_outputs/orchestration/runtime_state.json
