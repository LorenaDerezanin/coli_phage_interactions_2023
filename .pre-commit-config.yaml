repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
        files: ^lyzortx/
      - id: ruff-format
        files: ^lyzortx/

  - repo: local
    hooks:
      - id: no-ignored-files
        name: no-ignored-files
        entry: "bash -c 'ignored=$(git check-ignore --no-index -- \"$@\" 2>/dev/null) && { echo \"ERROR: committed files that should be gitignored:\"; echo \"$ignored\"; exit 1; } || exit 0' --"
        language: system
        stages: [pre-commit]
        always_run: true
      - id: pymarkdown
        name: pymarkdown
        entry: pymarkdown --config .pymarkdown.yaml fix
        language: python
        additional_dependencies: ["pymarkdownlnt==0.9.36"]
        types_or: [markdown]
      - id: check-rebase-on-main
        name: check-rebase-on-main
        entry: scripts/check-rebase-on-main.sh
        language: script
        stages: [pre-push]
        always_run: true
